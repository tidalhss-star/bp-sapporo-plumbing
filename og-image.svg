<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="329" cy="19" r="65" fill="#e91e63" opacity="0.08"/>
    <circle cx="920" cy="352" r="32" fill="#e91e63" opacity="0.07"/>
    <circle cx="1068" cy="208" r="86" fill="#e91e63" opacity="0.08"/>
    <circle cx="654" cy="136" r="81" fill="#e91e63" opacity="0.11"/>
    <circle cx="980" cy="472" r="77" fill="#e91e63" opacity="0.13"/>
    <circle cx="665" cy="601" r="61" fill="#e91e63" opacity="0.17"/>
    <rect x="647" y="160" width="64" height="92" rx="8" fill="#c2185b" opacity="0.10" transform="rotate(22, 716, 402)"/>
    <rect x="544" y="602" width="36" height="73" rx="8" fill="#c2185b" opacity="0.13" transform="rotate(5, 1190, 572)"/>
    <rect x="608" y="299" width="30" height="78" rx="8" fill="#c2185b" opacity="0.07" transform="rotate(27, 1190, 110)"/>
    <rect x="153" y="171" width="29" height="34" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(17, 1046, 526)"/>
    <rect x="236" y="413" width="50" height="26" rx="8" fill="#c2185b" opacity="0.15" transform="rotate(15, -65, 635)"/>
    <rect x="1171" y="348" width="92" height="69" rx="8" fill="#c2185b" opacity="0.11" transform="rotate(42, 744, 703)"/>
    <rect x="932" y="308" width="83" height="93" rx="8" fill="#c2185b" opacity="0.07" transform="rotate(3, 95, 256)"/>
    <rect x="454" y="628" width="38" height="47" rx="8" fill="#c2185b" opacity="0.15" transform="rotate(40, 721, 478)"/>
    <polygon points="50,407 146,599 -46,599" fill="#e91e63" opacity="0.12"/>
    <polygon points="736,318 790,426 682,426" fill="#e91e63" opacity="0.07"/>
    <polygon points="119,402 145,454 93,454" fill="#e91e63" opacity="0.11"/>
    <polygon points="927,543 995,679 859,679" fill="#e91e63" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,540 C360,585 840,495 1200,540 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    합정 셔츠룸 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    합정 — 셔츠룸
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    합정 합정 셔츠룸 추천정보 — 셔츠룸
  </text>
</svg>